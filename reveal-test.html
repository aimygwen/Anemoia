<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reveal Intro — Test</title>
    <link rel="stylesheet" href="jelek-font.css" />
    <link rel="stylesheet" href="reveal-test.css" />
</head>
<body class="reveal-locked">
    <div id="reveal" class="reveal" aria-hidden="false">
        <div class="reveal__noise" aria-hidden="true"></div>

        <div class="reveal__stage">
            <blockquote class="reveal__quote-wrap">
                <canvas
                    id="reveal-ink"
                    class="reveal__ink"
                    role="img"
                    aria-labelledby="reveal-quote-sr"
                ></canvas>
                <p id="reveal-quote-sr" class="reveal__sr-only"></p>
            </blockquote>
        </div>

        <div class="reveal__footer">
            <button type="button" class="reveal-start" id="reveal-start" aria-hidden="true">
                <span class="reveal-start__label">Start</span>
            </button>
        </div>
    </div>

    <main id="demo-main" class="demo-main" hidden>
        <p class="demo-main__label">Demo page content</p>
        <h1>You're in.</h1>
        <p>The reveal faded — this is where the homepage would float in.</p>
        <button type="button" class="demo-reset" id="demo-reset">Replay reveal</button>
    </main>

    <script src="reveal-test.js"></script>
</body>
</html>
