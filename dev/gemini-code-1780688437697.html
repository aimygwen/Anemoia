<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aimy Gwen — Portfolio</title>
    <style>
        /* --- Reset & Core Aesthetics --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevents scrolling during the intro screen */
            height: 100vh;
        }

        /* --- Revealer Screen (Intro Overlay) --- */
        #revealer-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #0d0d0d; /* Slightly softer dark tone for a cozy vibe */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Ensures it sits on top of everything */
            padding: 2rem;
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), visibility 1.2s;
        }

        /* The container holding the quote to prevent layout shifting */
        .quote-container {
            max-width: 650px;
            text-align: center;
            min-height: 120px; /* Reserves space so elements don't jump */
            margin-bottom: 3rem;
        }

        .quote-text {
            font-size: 1.75rem;
            line-height: 1.5;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: #f5f5f7; /* Milky aesthetic white instead of blinding pure white */
        }

        /* Cozy blinking typing cursor */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.6rem;
            background-color: #f5f5f7;
            margin-left: 4px;
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* --- The Minimalist Button --- */
        .continue-btn {
            background: transparent;
            color: #f5f5f7;
            border: 1px solid rgba(245, 245, 247, 0.3);
            padding: 0.75rem 2rem;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            letter-spacing: 0.05em;
            opacity: 0; /* Hidden initially */
            transform: translateY(10px);
            transition: opacity 0.8s ease, transform 0.8s ease, border-color 0.3s ease, background-color 0.3s ease;
        }

        /* Class added via JavaScript once typing finishes */
        .continue-btn.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .continue-btn:hover {
            border-color: rgba(245, 245, 247, 1);
            background-color: rgba(245, 245, 247, 0.05);
        }

        /* --- State for fading out the overlay --- */
        #revealer-screen.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* --- Main Portfolio Site Content Container --- */
        #main-site {
            width: 100%;
            height: 100vh;
            overflow-y: auto; /* Enables scrolling for the actual site */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000; 
        }

        /* Temporary styling placeholder for your portfolio content */
        .placeholder-content {
            text-align: center;
            animation: fadeInContent 1.5s ease forward;
        }

        @keyframes fadeInContent {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- 1. INTRO REVEALER OVERLAY -->
    <div id="revealer-screen">
        <div class="quote-container">
            <span id="typing-target" class="quote-text"></span><span class="cursor" id="typing-cursor"></span>
        </div>
        <button id="continue-trigger" class="continue-btn">Continue</button>
    </div>

    <!-- 2. ACTUAL SITE CONTENT -->
    <main id="main-site">
        <div class="placeholder-content">
            <!-- Your portfolio code layout goes right here -->
            <h1 style="color: #ffffff; font-size: 3rem;">Your Website Content Appears Here</h1>
            <p style="color: #888; margin-top: 1rem;">Welcome to the portfolio.</p>
        </div>
    </main>

    <!-- --- JavaScript Logic --- -->
    <script>
        const quoteString = "Creativity doesn't seek an infinite canvas. It thrives on the boundaries it fights to break.";
        const typingSpeed = 45; // Milliseconds per letter. Lower numbers = faster typing.
        
        const textTarget = document.getElementById('typing-target');
        const continueBtn = document.getElementById('continue-trigger');
        const revealerScreen = document.getElementById('revealer-screen');
        const cursor = document.getElementById('typing-cursor');

        let index = 0;

        function typeWriter() {
            if (index < quoteString.length) {
                textTarget.innerHTML += quoteString.charAt(index);
                index++;
                setTimeout(typeWriter, typingSpeed);
            } else {
                // Typing is finished! Smoothly bring in the button
                setTimeout(() => {
                    continueBtn.classList.add('visible');
                }, 400); // Small aesthetic pause before button shows up
            }
        }

        // Trigger the animation once the page layout is ready
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(typeWriter, 800); // Short initial delay before typing starts for cinematic effect
        });

        // Click event to slide/fade away the overlay and show your actual site
        continueBtn.addEventListener('click', () => {
            revealerScreen.classList.add('fade-out');
            
            // Optional: Hide the cursor tracking after fade out to clean up memory
            setTimeout(() => {
                cursor.style.display = 'none';
            }, 1200);
        });
    </script>
</body>
</html>
